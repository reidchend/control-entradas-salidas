name: Build Android APK (Standard Fix 2026)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgles2-mesa-dev libpango1.0-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet & Tools
        run: |
          pip install flet==0.28.3 cookiecutter setuptools wheel
          

      - name: Build APK
        run: |
          # 1. Aceptar licencias de forma robusta
          yes | flutter doctor --android-licenses || true

          # 2. Inyectar Secretos
          cat << EOF > .env
          DB_TYPE=postgresql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=6543
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          FLET_APP_NAME="Lycoris Control"
          EOF

          mkdir -p config
          cp .env config/.env
          
          # 3. Requirements limpios
          cat << EOF > requirements.txt
          flet==0.28.3
          supabase
          sqlalchemy
          greenlet
          pg8000
          pydantic
          flet-webview
          pydantic-settings
          python-dotenv
          certifi
          EOF

          # 1. Creamos el archivo de extensión de Flet (La llave maestra)
          cat << EOF > ext.yaml
          android:
            permissions:
              - android.permission.INTERNET
              - android.permission.POST_NOTIFICATIONS
              - android.permission.WAKE_LOCK
            manifest_placeholders:
              appName: "Lycoris Control"
          EOF

          # 2. Google Services en la raíz (Indispensable)
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          
          # 4. Construcción (Quitamos --project que a veces causa conflictos con --product)
          flet build apk \
            --product "Lycoris Control" \
            --org "com.reidchend.lycoris" \
            --build-number 6 \
            --build-version "1.0.5" \
            --no-rich-output 
        env:
          CI: true

      - name: Rename APK
        run: |
          # Usamos un comando más flexible por si genera varios APKs
          find build/apk -name "*.apk" -exec mv {} build/apk/LycorisControl.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LycorisControl-APK
          path: build/apk/LycorisControl.apk
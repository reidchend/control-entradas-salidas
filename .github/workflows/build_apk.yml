name: Build Android APK (Standard Fix 2026)
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgles2-mesa-dev libpango1.0-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet & Tools
        run: |
          pip install flet-cli cookiecutter setuptools wheel

      - name: Build APK
        run: |
          # Aceptar licencias
          yes | flutter doctor --android-licenses || true

          # Inyectar Secretos
          cat << EOF > .env
          DB_TYPE=postgresql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=6543
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          FLET_APP_NAME="Lycoris Control"
          EOF

          mkdir -p config
          cp .env config/.env
          
          # Requirements
          cat << EOF > requirements.txt
          flet
          supabase
          sqlalchemy
          greenlet
          pg8000
          pydantic
          flet-webview
          pydantic-settings
          python-dotenv
          certifi
          EOF
          
          pip install -r requirements.txt

          # Extensión Flet
          cat << EOF > ext.yaml
          android:
            permissions:
              - android.permission.INTERNET
              - android.permission.POST_NOTIFICATIONS
              - android.permission.WAKE_LOCK
            manifest_placeholders:
              appName: "Lycoris Control"
          EOF

          # Google Services
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          
          # Construcción
          flet build apk \
            --yes \
            --product "Lycoris Control" \
            --org "com.reidchend" \
            --android-adaptive-icon-background "#1A1A1A" \
            --build-number 5 \
            --build-version "1.0.4" \
            --no-rich-output 
        env:
          CI: true

      - name: Rename APK
        run: |
          find build/apk -name "*.apk" -exec mv {} build/apk/LycorisControl.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LycorisControl-APK
          path: build/apk/LycorisControl.apk